name: xcapture
description: Browse your Xbox screenshots and game clips.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  gal: ^2.3.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5
  package_info_plus: ^8.0.0
  dynamic_color: ^1.7.0
  window_manager: ^0.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.png"
  windows:
    generate: true
  linux:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
